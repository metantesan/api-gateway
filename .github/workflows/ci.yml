name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start services
        run: |
          cd test
          docker compose -f docker-compose.test.yml up -d --build --wait --timeout 120

      - name: Wait for gateway to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Gateway is ready"
              break
            fi
            echo "Waiting for gateway... ($i/30)"
            sleep 2
          done

      - name: Wait for logstash mock to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:5045/ > /dev/null 2>&1; then
              echo "Logstash mock is ready"
              break
            fi
            echo "Waiting for logstash mock... ($i/15)"
            sleep 2
          done

      - name: Run integration tests
        run: bash test/run.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          cd test
          docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: |
          cd test
          docker compose -f docker-compose.test.yml down -v

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: "v2.4.1"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: src/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}