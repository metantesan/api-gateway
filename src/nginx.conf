worker_processes auto;
worker_rlimit_nofile 65535;

env GWCONF;

pid /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 65535;
    multi_accept on;
}

http {
    lua_package_path "/usr/local/openresty/nginx/conf/lua/?.lua;/usr/local/lib/lua/?.lua;;";

    resolver 127.0.0.11 ipv6=off valid=30s;

    lua_need_request_body on;
    client_body_buffer_size 10K;
    client_max_body_size 10M;

    vhost_traffic_status_zone shared:vhost_traffic_status:12m;
    vhost_traffic_status_filter_by_set_key $status status::*;
    vhost_traffic_status_histogram_buckets 0.005 0.01 0.05 0.1 0.5 1 5 10;

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=gw_cache:10m max_size=100m inactive=10m use_temp_path=off;

    lua_shared_dict prometheus_metrics 10m;
    lua_shared_dict rate_limiting_store 10m;

    init_worker_by_lua_file conf/lua/init.lua;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        keepalive_timeout 60s;
        listen 8080;

        set $backend_url "";
        set $backend_name "";
        set $cors_origin "";
        set $cors_credentials "";
        set $appname "";
        set $cache_key "";
        set $cache_bypass 0;
        set $cache_nocache 0;
        set $resp_body "";

        location / {
            rewrite_by_lua_file conf/lua/middleware/cors.lua;
            access_by_lua_file conf/lua/routes/router.lua;
            header_filter_by_lua_file conf/lua/middleware/cors_headers.lua;
            body_filter_by_lua_file conf/lua/middleware/body_filter.lua;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Max-Age;

            add_header X-Cache-Status $upstream_cache_status always;

            proxy_cache gw_cache;
            proxy_cache_key $cache_key;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_bypass $cache_bypass;
            proxy_no_cache $cache_nocache;
            proxy_cache_use_stale error timeout updating;

            proxy_pass $backend_url$request_uri;
            log_by_lua_file conf/lua/metrics/metrics.lua;
        }

        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format html;
        }
    }

    server {
        listen 9145;
        location /metrics {
            allow all;
            content_by_lua_block {
                require("metrics.monitoring").prometheus:collect()
            }
        }
        location /vts_metrics {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
        }
    }
}

error_log /dev/stdout info;