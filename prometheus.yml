global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/vts_metrics'
    static_configs:
      - targets: ['api-gateway:9145']
    honor_timestamps: true

  - job_name: 'api-gateway-lua'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:9145']
    honor_timestamps: true