services:
  api-gateway:
    build:
      context: ../src
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9145:9145"
    environment:
      - GWCONF=/etc/gwconf/gateway.yaml
    volumes:
      - ../gateway.yaml:/etc/gwconf/gateway.yaml:ro
      - cache_data:/tmp/nginx_cache
    networks:
      - gateway

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateway

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/json/api-gateway.json
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - gateway

volumes:
  cache_data:
  prometheus_data:
  grafana_data:

networks:
  gateway:
    name: gateway-net