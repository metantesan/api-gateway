events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        default_type application/json;

        location / {
            content_by_lua_block {
                ngx.header['Cache-Control'] = 'public, max-age=60'
                ngx.say('{"backend":"echo","method":"' .. ngx.var.request_method .. '","path":"' .. ngx.var.uri .. '","host":"' .. ngx.var.host .. '","rand":"' .. tostring(math.random(1, 999999)) .. '"}')
            }
        }
    }
}