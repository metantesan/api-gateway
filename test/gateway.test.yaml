routes:
  - match: "^/api/([a-zA-Z0-9_-]+)(/.*)?$"
    backends:
      example: "http://echo-backend"
      auth: "http://echo-backend"
    rate_limit:
      rps: 2
      burst: 2
    cache: true

  - match: "^/.well-known/.*$"
    backend: "http://echo-backend"
    rate_limit:
      rps: 2
      burst: 2

  - match: "^/$"
    backend: "http://echo-backend"
    cache: true

cors:
  allowed_origins:
    - "test.example.com"