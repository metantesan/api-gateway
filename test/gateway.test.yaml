logging:
  enabled: true
  endpoint: "http://logstash-mock:5044"
  timeout_ms: 2000

routes:
  - name: api
    match: "^/api/([a-zA-Z0-9_-]+)(/.*)?$"
    backends:
      example: "http://echo-backend"
      auth: "http://echo-backend"
    rate_limit:
      rps: 2
      burst: 2
    cache: true

  - name: sso
    match: "^/.well-known/.*$"
    backend: "http://echo-backend"
    rate_limit:
      rps: 2
      burst: 2

  - name: landing
    match: "^/$"
    backend: "http://echo-backend"
    cache: true

cors:
  allowed_origins:
    - "test.example.com"
